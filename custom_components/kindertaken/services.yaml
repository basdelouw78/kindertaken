mark_done:
  name: Taak afvinken
  description: Toggle een taak als gedaan/ongedaan.
  fields:
    key:
      name: Taak-sleutel
      description: Interne sleutel van de taak (uit sensor attributen).
      required: false
      example: "rot__2024-09-02__Emma__Afwasmachine vullen"
      selector:
        text:
    child:
      name: Kind
      description: Naam van het kind (alternatief voor key).
      required: false
      selector:
        text:
    task:
      name: Taak
      description: Naam van de taak.
      required: false
      selector:
        text:

reset_week:
  name: Week resetten
  description: Maakt alle afgevinkte weektaken ongedaan (maandtaken blijven).

reset_all:
  name: Alles resetten
  description: Maakt ALLE afgevinkte taken ongedaan.

set_presence:
  name: Aanwezigheid instellen
  description: Handmatige override van aanwezigheid voor een kind. Gebruik present=null om te resetten.
  fields:
    child:
      name: Kind
      description: Naam van het kind.
      required: true
      selector:
        text:
    present:
      name: Aanwezig
      description: "true = aanwezig, false = niet aanwezig, null/weglaten = automatisch (reset override)"
      required: false
      selector:
        boolean:

clear_presence_override:
  name: Aanwezigheid override wissen
  description: Reset de handmatige aanwezigheidsoverride — systeem gebruikt weer het ingestelde patroon.
  fields:
    child:
      name: Kind
      required: true
      selector:
        text:
